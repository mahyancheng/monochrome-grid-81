  <!-- Google 统计与广告追踪 (gtag.js) -->
  <!-- 移除原本 head 里的同步脚本，改为动态加载 -->
  <!-- index.html 中的修改建议 -->
  <script>
    window.addEventListener('load', function () {
      // 1. 定义初始化函数
      const initGTM = function () {
        if (window.gtmInitialized) return;
        window.gtmInitialized = true;

        const script = document.createElement('script');
        script.async = true;
        // 只需要加载一个基础库，其他的通过 config 触发
        script.src = "https://www.googletagmanager.com/gtag/js?id=G-5PBQHDG583";
        document.head.appendChild(script);

        script.onload = function () {
          window.dataLayer = window.dataLayer || [];
          function gtag() { dataLayer.push(arguments); }
          gtag('js', new Date());

          // 关键：合并配置，减少主线程反复唤醒
          gtag('config', 'G-5PBQHDG583', { 'send_page_view': true });
          gtag('config', 'AW-18088543111');
          gtag('config', 'AW-11342839562');
        };
      };

      // 2. 更加智能的加载时机：要么浏览器空闲，要么用户开始操作
      if ('requestIdleCallback' in window) {
        // 浏览器空闲时加载，设定 3 秒的超时上限
        requestIdleCallback(() => initGTM(), { timeout: 3000 });
      } else {
        // 备选方案：如果用户滚动或点击，立即加载
        const triggerLoader = () => {
          initGTM();
          window.removeEventListener('scroll', triggerLoader);
          window.removeEventListener('click', triggerLoader);
        };
        window.addEventListener('scroll', triggerLoader, { passive: true });
        window.addEventListener('click', triggerLoader, { passive: true });
        // 如果用户没操作，5 秒后保底加载
        setTimeout(initGTM, 5000);
      }
    });
  </script>
</head>

<body>
  <!-- React 18 挂载点 -->
  <div id="root"></div>

  <!-- 主入口脚本 -->
  <script type="module" src="/src/main.tsx"></script>
</body>
