  <!-- Google tag (gtag.js) 性能优化加载逻辑 -->
  <script>
    // 定义全局 gtag 函数以防止未加载完成时报错
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    
    window.addEventListener('load', function () {
      const initGTM = function () {
        if (window.gtmInitialized) return;
        window.gtmInitialized = true;

        const script = document.createElement('script');
        script.async = true;
        script.src = "https://www.googletagmanager.com/gtag/js?id=GT-57SQ5RG3";
        document.head.appendChild(script);

        script.onload = function () {
          gtag('js', new Date());
          gtag('config', 'GT-57SQ5RG3');
        };
      };

      if ('requestIdleCallback' in window) {
        requestIdleCallback(() => initGTM(), { timeout: 3000 });
      } else {
        const triggerLoader = () => {
          initGTM();
          window.removeEventListener('scroll', triggerLoader);
          window.removeEventListener('click', triggerLoader);
        };
        window.addEventListener('scroll', triggerLoader, { passive: true });
        window.addEventListener('click', triggerLoader, { passive: true });
        setTimeout(initGTM, 5000);
      }
    });
  </script>
</head>

<body>
  <div id="root"></div>

</body>
